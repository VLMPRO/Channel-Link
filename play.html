<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Premium Plyr Video Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* কন্টেইনারকে ১০০% রেস্পনসিভ করা হয়েছে যাতে চারপাশের কালো অংশ চলে যায় */
        .player-container {
            width: 100%;
            max-width: 100%; /* ডিভাইস অনুযায়ী পুরো স্ক্রিন নিবে */
            height: 100%;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Plyr প্লেয়ারকে কন্টেইনারের সাথে ১০০% ফিট করার জন্য CSS */
        .plyr {
            width: 100% !important;
            height: 100% !important;
            max-width: 100%;
            border-radius: 0px; /* ফুল স্ক্রিন বা রেস্পনসিভ লুকে বর্ডার রেডিয়াস ০ রাখাই ভালো */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --plyr-color-main: #00bfff; /* থিম কালার */
        }

        /* ভিডিও ট্যাগ যেন কোনো কালো ফ্রেম না রেখে পুরো জায়গা জুড়ে থাকে */
        video {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain; /* ভিডিওর আসল অনুপাত ঠিক রেখে স্ক্রিনে ফিট করবে */
            background-color: #000;
        }

        /* ব্রাউজারের ডিফল্ট কন্ট্রোল চিরতরে বন্ধ রাখার ব্যাকআপ */
        video::-webkit-media-controls {
            display: none !important;
        }
        video::-webkit-media-controls-enclosure {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="player" playsinline crossorigin poster="https://bitdash-a.akamaihd.net/content/sintel/poster.png">
            <source src="http://198.195.239.50:8095/unt-s/video.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('player');
            const source = video.getElementsByTagName('source')[0].src;
            
            // Plyr কন্ট্রোলস এবং সেটিংস কনফিগারেশন
            const defaultOptions = {
                controls: [
                    'play-large', 'play', 'progress', 'current-time', 
                    'duration', 'mute', 'volume', 'captions', 
                    'settings', 'pip', 'airplay', 'fullscreen'
                ],
                settings: ['quality', 'speed', 'loop'],
                // ratio: '16:9', // প্লেয়ারের অ্যাসপেক্ট রেশিও লক করতে চাইলে এটি অন করতে পারেন
                quality: { default: 0, options: [0], forced: true, onChange: (e) => updateQuality(e) }
            };

            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxMaxBufferLength: 10,
                    enableWorker: true
                });
                hls.loadSource(source);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                    const availableQualities = data.levels.map((l) => l.height);
                    availableQualities.unshift(0); // ০ মানে অটো কোয়ালিটি

                    defaultOptions.quality = {
                        default: 0,
                        options: availableQualities,
                        forced: true,
                        onChange: (e) => {
                            if (e === 0) {
                                hls.currentLevel = -1; // অটো মোড
                            } else {
                                data.levels.forEach((level, levelIndex) => {
                                    if (level.height === e) {
                                        hls.currentLevel = levelIndex;
                                    }
                                });
                            }
                        }
                    };
                    
                    new Plyr(video, defaultOptions);
                });

                window.hls = hls;
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari বা iOS এর জন্য নেটিভ সাপোর্ট
                video.src = source;
                new Plyr(video, defaultOptions);
            } else {
                // সাধারণ MP4 বা ব্যাকআপ প্লেব্যাক
                new Plyr(video, defaultOptions);
            }
        });
    </script>
</body>
</html>
